name: Reusable Go Test

# Workflow reusable estandarizado para testing de repos Go del fleet Alebrije (ADR-001 Block A).
#
# Implementa:
#   - Testing estándar: go test -race -cover con gate de cobertura 90% (inmóvil, Rule G)
#   - Linting: golangci-lint v2 con configuración per-repo
#   - Services opcionales: PostgreSQL 16 + Redis 7 (para repos con DB)
#   - Git config para repos privados: GH_TOKEN → GOPRIVATE
#   - Coverage gate FATAL: no hay || true, falla si coverage < threshold
#   - Codecov upload (best-effort, no bloquea)
#   - Concurrency: Cancel runs previos en la misma rama
#
# Diseño clave:
#   1. with-services input (boolean) controla si levanta postgres + redis.
#      Para repos sin DB dependencies (libs puras), set with-services: false.
#   2. lint input (boolean) permite skip de linting si no es necesario.
#   3. race input (boolean) para desactivar -race flag en casos excepcionales.
#   4. coverage-threshold es INMÓVIL: 90% (Rule G ADR Alebrije).
#   5. GOPRIVATE y git config son obligatorios para acceso a repos privados.
#   6. arc-runner-set es obligatorio (contiene Vault, K8s access si se necesita).

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use (default: 1.23, la versión canónica del fleet)"
        type: string
        default: "1.23"
        required: false
      coverage-threshold:
        description: "Coverage percentage threshold (default: 90, INMÓVIL)"
        type: number
        default: 90
        required: false
      module-path:
        description: "Go module path within the repo (default: '.')"
        type: string
        default: "."
        required: false
      with-services:
        description: "Whether to spin up postgres:16 + redis:7 services (default: true)"
        type: boolean
        default: true
        required: false
      lint:
        description: "Whether to run golangci-lint (default: true)"
        type: boolean
        default: true
        required: false
      race:
        description: "Whether to use -race flag in tests (default: true)"
        type: boolean
        default: true
        required: false
      test-tags:
        description: "Build tags for go test (e.g. 'integration'). Empty = no tags."
        type: string
        default: ""
        required: false
    secrets:
      GH_TOKEN:
        description: "GitHub token for private repo access"
        required: true

permissions:
  contents: read

concurrency:
  group: test-go-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Test job with services (postgres + redis)
  test-with-services:
    if: ${{ inputs.with-services }}
    name: Test with services
    runs-on: arc-runner-set
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db?sslmode=disable
      REDIS_URL: redis://localhost:6379
      GOPRIVATE: github.com/alebrije-io
      GONOSUMCHECK: github.com/alebrije-io

    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Configure git for private repos
        run: git config --global url."https://${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Go ${{ inputs.go-version }}
        uses: actions/setup-go@cdcb36256b49618355e264982131d2dec09dee08  # v5.1.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.module-path }}/go.sum

      - name: Download dependencies
        run: |
          cd ${{ inputs.module-path }}
          go mod download
          go mod verify

      - name: Lint with golangci-lint
        if: ${{ inputs.lint }}
        uses: golangci/golangci-lint-action@3f06ab41dd0f7fbf14c900841e8861faca4e8e38  # v6.1.0
        with:
          working-directory: ${{ inputs.module-path }}
          args: --config .golangci.yml

      - name: Run tests with coverage
        env:
          TEST_TAGS: ${{ inputs.test-tags }}
          RACE_FLAG_INPUT: ${{ inputs.race }}
        run: |
          cd ${{ inputs.module-path }}
          RACE_FLAG=""
          if [ "$RACE_FLAG_INPUT" == "true" ]; then
            RACE_FLAG="-race"
          fi
          TAGS_FLAG=""
          if [ -n "$TEST_TAGS" ]; then
            TAGS_FLAG="-tags $TEST_TAGS"
          fi
          go test $RACE_FLAG $TAGS_FLAG -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage gate (90% immutable, Rule G)
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          cd ${{ inputs.module-path }}
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
          echo "Coverage: ${COVERAGE}%"

          # Portable floating-point comparison using awk
          if awk "BEGIN { exit !($COVERAGE + 0 < $COVERAGE_THRESHOLD) }"; then
            echo "::error::Coverage ${COVERAGE}% is below threshold $COVERAGE_THRESHOLD%"
            exit 1
          fi
          echo "::notice::Coverage ${COVERAGE}% meets threshold $COVERAGE_THRESHOLD%"

      - name: Write coverage summary
        if: always()
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          cd ${{ inputs.module-path }}
          echo "### Go Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
            echo "| Overall Coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Gate Threshold | $COVERAGE_THRESHOLD% |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | No coverage data |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage to codecov (best-effort)
        uses: codecov/codecov-action@125fc84a2bfd3c102d6a49fa07367b1ac6dbf2ac  # v4.4.1
        with:
          files: ${{ inputs.module-path }}/coverage.out
          flags: go
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf7e19c021a7b80b37814  # v4.6.1
        with:
          name: coverage-go-${{ github.run_id }}
          path: ${{ inputs.module-path }}/coverage.out
          retention-days: 7

  # Test job without services (for libraries with no DB dependency)
  test-without-services:
    if: ${{ !inputs.with-services }}
    name: Test (no services)
    runs-on: arc-runner-set
    timeout-minutes: 20

    env:
      GOPRIVATE: github.com/alebrije-io
      GONOSUMCHECK: github.com/alebrije-io

    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Configure git for private repos
        run: git config --global url."https://${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Go ${{ inputs.go-version }}
        uses: actions/setup-go@cdcb36256b49618355e264982131d2dec09dee08  # v5.1.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.module-path }}/go.sum

      - name: Download dependencies
        run: |
          cd ${{ inputs.module-path }}
          go mod download
          go mod verify

      - name: Lint with golangci-lint
        if: ${{ inputs.lint }}
        uses: golangci/golangci-lint-action@3f06ab41dd0f7fbf14c900841e8861faca4e8e38  # v6.1.0
        with:
          working-directory: ${{ inputs.module-path }}
          args: --config .golangci.yml

      - name: Run tests with coverage
        env:
          TEST_TAGS: ${{ inputs.test-tags }}
          RACE_FLAG_INPUT: ${{ inputs.race }}
        run: |
          cd ${{ inputs.module-path }}
          RACE_FLAG=""
          if [ "$RACE_FLAG_INPUT" == "true" ]; then
            RACE_FLAG="-race"
          fi
          TAGS_FLAG=""
          if [ -n "$TEST_TAGS" ]; then
            TAGS_FLAG="-tags $TEST_TAGS"
          fi
          go test $RACE_FLAG $TAGS_FLAG -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage gate (90% immutable, Rule G)
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          cd ${{ inputs.module-path }}
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
          echo "Coverage: ${COVERAGE}%"

          # Portable floating-point comparison using awk
          if awk "BEGIN { exit !($COVERAGE + 0 < $COVERAGE_THRESHOLD) }"; then
            echo "::error::Coverage ${COVERAGE}% is below threshold $COVERAGE_THRESHOLD%"
            exit 1
          fi
          echo "::notice::Coverage ${COVERAGE}% meets threshold $COVERAGE_THRESHOLD%"

      - name: Write coverage summary
        if: always()
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          cd ${{ inputs.module-path }}
          echo "### Go Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
            echo "| Overall Coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Gate Threshold | $COVERAGE_THRESHOLD% |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | No coverage data |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage to codecov (best-effort)
        uses: codecov/codecov-action@125fc84a2bfd3c102d6a49fa07367b1ac6dbf2ac  # v4.4.1
        with:
          files: ${{ inputs.module-path }}/coverage.out
          flags: go
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf7e19c021a7b80b37814  # v4.6.1
        with:
          name: coverage-go-${{ github.run_id }}
          path: ${{ inputs.module-path }}/coverage.out
          retention-days: 7
