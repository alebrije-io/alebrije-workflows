name: Reusable Trivy Security Scan

# Workflow reusable hardened para seguridad multi-capa (ADR-29).
#
# Implementa:
#   - Trivy filesystem scan (dependencias declaradas: go.sum, requirements.txt, mix.lock)
#   - Trivy image scan (CVEs de la imagen publicada; severidades configurables)
#   - Trivy config scan (manifests k8s/) — advisory only, no bloquea
#   - SBOM CycloneDX (anchore/sbom-action) como artifact con retención 90 días
#   - detect-secrets baseline audit (opt-in vía scan-secrets)
#   - Cosign keyless signing via Sigstore OIDC (opt-in, solo main push)
#   - Upload SARIF a GitHub Security tab (con continue-on-error para repos sin GHAS)
#
# Diseño clave (diferencia con build-push):
#   - build-push escanea la imagen en el mismo job donde la construye
#     (tiene la imagen en el cache local del runner)
#   - este workflow se usa como JOB SEPARADO post-build — cubre fs + config
#     que no tienen sentido en build-push, y repite image-scan con SARIF
#     dirigido al Security tab bajo categorías separadas
#
# Ejemplo en ci.yml del servicio:
#   security:
#     needs: build-and-push
#     uses: alebrije-io/alebrije-workflows/.github/workflows/reusable-security-scan.yml@main
#     with:
#       image-ref: ileonelperea/alebrije-svc-auth:${{ needs.build-and-push.outputs.version }}
#       scan-type: all
#       fail-on: CRITICAL,HIGH
#     secrets: inherit

on:
  workflow_call:
    inputs:
      image-ref:
        description: "Docker image ref to scan (e.g. ileonelperea/alebrije-svc-auth:1.2.3)"
        required: false
        default: ""
        type: string
      scan-type:
        description: "image | fs | config | all"
        required: false
        default: "all"
        type: string
      fail-on:
        description: "Comma-separated severities that fail the job (e.g. CRITICAL,HIGH)"
        required: false
        default: "CRITICAL,HIGH"
        type: string
      config-scan-path:
        description: "Path para trivy config scan (default: k8s/)"
        required: false
        default: "k8s/"
        type: string
      sbom-path:
        description: "Path para SBOM generation (default: .)"
        required: false
        default: "."
        type: string
      scan-secrets:
        description: "Run detect-secrets baseline audit (non-blocking)"
        required: false
        default: true
        type: boolean
      sign-image:
        description: "Sign image with Cosign (keyless Sigstore OIDC, main push only)"
        required: false
        default: true
        type: boolean
      run-grype:
        description: "Run Grype supply chain scan"
        required: false
        default: true
        type: boolean
      run-osv:
        description: "Run OSV-Scanner dependency vulnerabilities"
        required: false
        default: true
        type: boolean
      run-codeql:
        description: "Run CodeQL SAST analysis (advisory)"
        required: false
        default: false
        type: boolean
      codeql-languages:
        description: "Comma-separated CodeQL languages (go,python,javascript,typescript)"
        required: false
        default: "python"
        type: string

permissions:
  contents: read
  id-token: write          # Cosign keyless signing via Sigstore OIDC
  security-events: write   # upload-sarif

jobs:
  # ======================================================================
  # FILESYSTEM SCAN — dependencias declaradas en el repo
  # ======================================================================
  trivy-fs-scan:
    name: Trivy filesystem scan
    if: ${{ inputs.scan-type == 'fs' || inputs.scan-type == 'all' }}
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Trivy fs scan (blocking on ${{ inputs.fail-on }})
        uses: aquasecurity/trivy-action@6e7b7d1feac57900da086aab9910c4a723a29e20  # v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: ${{ inputs.fail-on }}
          exit-code: 1
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif

      - name: Upload fs SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@883bce87b3291ad2b9a21f98b1ade60785d39451  # v3.26.0
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ======================================================================
  # IMAGE SCAN — imagen ya publicada (post-build-push)
  # ======================================================================
  trivy-image-scan:
    name: Trivy image scan
    if: ${{ (inputs.scan-type == 'image' || inputs.scan-type == 'all') && inputs.image-ref != '' }}
    runs-on: arc-runner-set
    steps:
      - name: Trivy image scan (blocking on ${{ inputs.fail-on }})
        uses: aquasecurity/trivy-action@6e7b7d1feac57900da086aab9910c4a723a29e20  # v0.24.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image-ref }}
          severity: ${{ inputs.fail-on }}
          exit-code: 1
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif

      - name: Upload image SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@883bce87b3291ad2b9a21f98b1ade60785d39451  # v3.26.0
        continue-on-error: true
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ======================================================================
  # CONFIG SCAN — manifests k8s/, Dockerfiles (advisory only)
  # ======================================================================
  # exit-code: 0 para NO bloquear. Los linters yaml/k8s generan ruido que
  # se triaga manualmente, no deberían tumbar el pipeline.
  trivy-config-scan:
    name: Trivy config scan (advisory)
    if: ${{ inputs.scan-type == 'config' || inputs.scan-type == 'all' }}
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Check if config path exists
        id: check-path
        run: |
          if [ -d "${{ inputs.config-scan-path }}" ] || [ -f "${{ inputs.config-scan-path }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Config path '${{ inputs.config-scan-path }}' not found, skipping config scan"
          fi

      - name: Trivy config scan (table, non-blocking)
        if: steps.check-path.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@6e7b7d1feac57900da086aab9910c4a723a29e20  # v0.24.0
        with:
          scan-type: config
          scan-ref: ${{ inputs.config-scan-path }}
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

      - name: Trivy config scan (SARIF, non-blocking)
        if: steps.check-path.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: config
          scan-ref: ${{ inputs.config-scan-path }}
          severity: CRITICAL,HIGH
          exit-code: 0
          format: sarif
          output: trivy-config.sarif

      - name: Upload config SARIF to GitHub Security
        if: always() && steps.check-path.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@883bce87b3291ad2b9a21f98b1ade60785d39451  # v3.26.0
        continue-on-error: true
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ======================================================================
  # SBOM — best-effort CycloneDX via anchore/sbom-action
  # ======================================================================
  # Corre siempre (scan-type == any), porque el SBOM es compliance-first
  # y no está ligado a un tipo de escaneo.
  sbom:
    name: SBOM (CycloneDX)
    runs-on: arc-runner-set
    continue-on-error: true   # best-effort, no tumba el pipeline
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@94c5171b85ffd3245328d33f126e8afc59d4341e  # v0.17.1
        with:
          path: ${{ inputs.sbom-path }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c6e5e938f0e6ea  # v4.4.3
        with:
          name: sbom-cyclonedx-${{ github.run_number }}
          path: sbom.cdx.json
          retention-days: 90

  # ======================================================================
  # DETECT-SECRETS — baseline audit (opt-in)
  # ======================================================================
  # Preserva la infra existente del workflow original.
  detect-secrets:
    name: detect-secrets baseline audit
    if: ${{ inputs.scan-secrets }}
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - uses: actions/setup-python@f677139bbe7f9c59030f3dec7cea6f7fc22ad2b7  # v5.2.0
        with:
          python-version: "3.12"

      - name: Install and run detect-secrets
        run: |
          pip install detect-secrets --quiet
          echo "::group::Scanning for secrets"
          detect-secrets scan --baseline .secrets.baseline
          echo "::endgroup::"
          echo "::group::Auditing against baseline"
          detect-secrets audit --report .secrets.baseline
          echo "::endgroup::"

  # ======================================================================
  # COSIGN KEYLESS SIGNING — preserved from previous version
  # ======================================================================
  # Solo corre si:
  #   - inputs.sign-image == true
  #   - inputs.image-ref no está vacío
  #   - image-scan pasó (needs lo encadena)
  #   - es push event en main
  cosign-sign:
    name: Cosign keyless sign
    needs: trivy-image-scan
    if: |
      inputs.sign-image &&
      inputs.image-ref != '' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: arc-runner-set
    steps:
      - uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2ea8694d7cc6b2da6ac0d  # v3.5.0

      - name: Sign image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          echo "Signing image: ${{ inputs.image-ref }}"
          cosign sign --yes "${{ inputs.image-ref }}"
          echo "Image signed via Sigstore transparency log"

  # ======================================================================
  # GRYPE — supply chain scan (Block E)
  # ======================================================================
  # Runs in parallel con otros scanners. Cada scanner encuentra vulns diferentes.
  grype-scan:
    name: Grype supply chain scan
    if: ${{ inputs.run-grype }}
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Grype filesystem scan (blocking HIGH/CRITICAL)
        uses: anchore/scan-action@3343887d815470937b28435c1f47a622ac5a202d  # v4.1.0
        id: grype
        with:
          path: "."
          severity-cutoff: high
          output-format: sarif
          fail-build: true

      - name: Upload Grype SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@883bce87b3291ad2b9a21f98b1ade60785d39451  # v3.26.0
        continue-on-error: true
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-supply-chain

  # ======================================================================
  # OSV-SCANNER — dependency vulnerabilities cross-language (Block E)
  # ======================================================================
  osv-scan:
    name: OSV-Scanner dependency vulnerabilities
    if: ${{ inputs.run-osv }}
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: OSV-Scanner (blocking HIGH/CRITICAL)
        uses: google/osv-scanner-action/osv-scanner-action@216810cdc61a81e1e59d9c84b8047cd93fcde376  # v1.8.0
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            .

      - name: Upload OSV SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@883bce87b3291ad2b9a21f98b1ade60785d39451  # v3.26.0
        continue-on-error: true
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  # ======================================================================
  # CODEQL — SAST analysis (Block E, advisory only)
  # ======================================================================
  # CodeQL results go to Security tab. No exit code failure — es análisis estático,
  # las alertas son informativas, no bloquean el pipeline.
  codeql-analysis:
    name: CodeQL SAST (advisory)
    if: ${{ inputs.run-codeql }}
    runs-on: arc-runner-set
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(format('[{0}]', join(split(inputs.codeql-languages, ','), ','))) }}
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@883bce87b3291ad2b9a21f98b1ade60785d39451  # v3.26.0
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@883bce87b3291ad2b9a21f98b1ade60785d39451  # v3.26.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@883bce87b3291ad2b9a21f98b1ade60785d39451  # v3.26.0
        with:
          category: "/language:${{ matrix.language }}"

  # ======================================================================
  # SUMMARY — runs even if upstream jobs fail
  # ======================================================================
  summary:
    name: Security scan summary
    if: always()
    needs: [trivy-fs-scan, trivy-image-scan, trivy-config-scan, sbom, detect-secrets, cosign-sign, grype-scan, osv-scan, codeql-analysis]
    runs-on: arc-runner-set
    steps:
      - name: Print summary
        run: |
          echo "Security Scan Summary"
          echo "====================="
          echo "scan-type:       ${{ inputs.scan-type }}"
          echo "fail-on:         ${{ inputs.fail-on }}"
          echo "image-ref:       ${{ inputs.image-ref != '' && inputs.image-ref || '(none, fs/config only)' }}"
          echo "config-path:     ${{ inputs.config-scan-path }}"
          echo ""
          echo "Job results:"
          echo "  trivy-fs-scan:     ${{ needs.trivy-fs-scan.result }}"
          echo "  trivy-image-scan:  ${{ needs.trivy-image-scan.result }}"
          echo "  trivy-config-scan: ${{ needs.trivy-config-scan.result }}"
          echo "  sbom:              ${{ needs.sbom.result }}"
          echo "  detect-secrets:    ${{ needs.detect-secrets.result }}"
          echo "  cosign-sign:       ${{ needs.cosign-sign.result }}"
          echo "  grype-scan:        ${{ needs.grype-scan.result }}"
          echo "  osv-scan:          ${{ needs.osv-scan.result }}"
          echo "  codeql-analysis:   ${{ needs.codeql-analysis.result }}"
          echo ""
          echo "False positives: add CVE IDs to .trivyignore at repo root"
          echo "SBOM artifact:   sbom-cyclonedx-${{ github.run_number }}"
