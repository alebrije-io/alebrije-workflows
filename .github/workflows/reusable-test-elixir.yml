name: Reusable Elixir Test

# ADR-67 production-like testing for Elixir services.
# Implements:
#   - ExUnit + ExCoveralls (90% gate, Rule G — immovable)
#   - Credo --strict (whitelist: AliasUsage/TagTODO/Refactor.Apply)
#   - Optional Dialyzer (slow, opt-in via input)
#   - StreamData property-based tests
#   - PostgreSQL 16 + Redis 7 services with health checks
#   - Dependency cache on mix.lock
#   - Dialyzer PLT cache (OTP+Elixir versioned)
#
# Design decisions:
# 1. Services always present (postgres + redis) — repos that don't need DB
#    can either ignore or override in calling repo's ci.yml.
# 2. Dialyzer is opt-in (with-dialyzer: false default) because PLT generation
#    is expensive (5-10 min). Critical paths can opt-in.
# 3. Coverage gate uses ExCoveralls JSON output, parsed with Python for portable
#    float comparison (avoids bc non-portability on macOS).
# 4. Credo failures are fatal (no || true) — linting is not optional.
# 5. All jobs run on arc-runner-set (Kubernetes runner) for consistency with
#    other fleet workflows and Vault access if needed.
#
# Ejemplo en repo individual:
#   - name: Test
#     uses: alebrije-io/alebrije-workflows/.github/workflows/reusable-test-elixir.yml@main
#     with:
#       elixir-version: '1.18'
#       otp-version: '27'
#       coverage-threshold: 90
#       with-dialyzer: false    # opt-in — slow
#       with-credo: true
#     secrets: inherit

on:
  workflow_call:
    inputs:
      elixir-version:
        description: 'Elixir version (default: 1.18 — fleet standard)'
        type: string
        default: '1.18'
        required: false
      otp-version:
        description: 'OTP version (default: 27 — fleet standard)'
        type: string
        default: '27'
        required: false
      coverage-threshold:
        description: 'Coverage threshold percentage (90 immovable per Rule G)'
        type: number
        default: 90
        required: false
      with-dialyzer:
        description: 'Run Dialyzer (slow, opt-in) — false by default'
        type: boolean
        default: false
        required: false
      with-credo:
        description: 'Run Credo linter — true by default'
        type: boolean
        default: true
        required: false
    secrets:
      GH_TOKEN:
        description: 'GitHub token for private repo access'
        required: true

permissions:
  contents: read

concurrency:
  group: test-elixir-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: arc-runner-set
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_INITDB_ARGS: --encoding=UTF8
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Setup git credentials for private repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global url.https://${GH_TOKEN}@github.com/.insteadOf https://github.com/

      - name: Setup Beam (Elixir + OTP)
        uses: erlef/setup-beam@7bac9ca1bd48b5e4021d43cbe9ce61172821b092  # v1.18.1
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}

      - name: Cache deps
        uses: actions/cache@704facf57c6b718b3694c8315cb0e8d32aa72d39  # v4.1.5
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-

      - name: Cache build artifacts
        uses: actions/cache@704facf57c6b718b3694c8315cb0e8d32aa72d39  # v4.1.5
        with:
          path: _build/test
          key: build-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            build-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-

      - name: Cache Dialyzer PLT
        if: ${{ inputs.with-dialyzer }}
        uses: actions/cache@704facf57c6b718b3694c8315cb0e8d32aa72d39  # v4.1.5
        with:
          path: priv/plts
          key: plts-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            plts-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Audit dependencies for known vulnerabilities
        run: mix deps.audit
        continue-on-error: true
        env:
          MIX_ENV: test

      - name: Compile with warnings-as-errors
        run: mix compile --warnings-as-errors

      - name: Credo (linter)
        if: ${{ inputs.with-credo }}
        run: mix credo --strict

      - name: Run tests with coverage
        run: mix coveralls.json

      - name: Check coverage threshold (90% immovable — Rule G)
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          COVERAGE=$(python3 -c "
          import json
          try:
            with open('cover/excoveralls.json') as f:
              d = json.load(f)
              cov = d.get('coverage', 0.0)
              print(f'{cov:.1f}')
          except Exception as e:
            print('0', file=__import__('sys').stderr)
            exit(1)
          " 2>/dev/null || echo "0")

          echo "Coverage: ${COVERAGE}%"
          echo "Threshold: ${COVERAGE_THRESHOLD}%"

          # Portable float comparison using python (no bc dependency)
          python3 << EOF
          import sys
          import os
          coverage = float('${COVERAGE}')
          threshold = float(os.environ['COVERAGE_THRESHOLD'])
          if coverage < threshold:
            print(f'::error::Coverage {coverage}% < threshold {threshold}%')
            sys.exit(1)
          print(f'::notice::Coverage {coverage}% meets threshold {threshold}%')
          EOF

      - name: Write coverage summary
        if: always()
        run: |
          echo "### Elixir Coverage" >> $GITHUB_STEP_SUMMARY
          mix coveralls 2>/dev/null | grep -E "Total|TOTAL|Coverage" | tail -5 >> $GITHUB_STEP_SUMMARY || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
        env:
          MIX_ENV: test

      - name: Dialyzer (type checker)
        if: ${{ inputs.with-dialyzer }}
        run: mix dialyzer

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@125fc84a2bfd3c102d6a49fa07367b1ac6dbf2ac  # v4.4.1
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: elixir
          fail_ci_if_error: false
