name: Validate alebrije-workflows (Security Hardening Block R)

# ADR-001 Block R: GitHub Actions Security Hardening
#
# Comprehensive self-validation of alebrije-workflows reusable workflows:
#   1. audit-shas: ALL uses: SHA-pinned (not @v* or @master)
#   2. check-hardcoded-secrets: NO AWS keys, GH tokens
#   3. check-permissions: EVERY workflow has permissions: block
#   4. validate-yaml: All YAML syntax valid
#   5. anti-patterns: Flag || true in critical contexts
#
# Runs on: PR (path filter), push main/develop, weekly schedule, manual dispatch
#
# Exit codes:
#   - 0: all checks pass
#   - 1: validation failed (audit log as comment if PR)

on:
  push:
    branches: [main, develop]
    paths: [.github/workflows/**, .github/actions/**]
  pull_request:
    branches: [main, develop]
    paths: [.github/workflows/**, .github/actions/**]
  schedule:
    # Weekly security audit (Sundays 00:00 UTC)
    - cron: "0 0 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  # ======================================================================
  # AUDIT 1: ALL uses: statements must be pinned to SHAs (NOT @v*, @master)
  # ======================================================================
  audit-shas:
    name: Audit SHA pinning (supply chain security)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: "Check for untagged uses: statements (supply chain risk)"
        id: audit-shas
        run: |
          echo "::group::Searching for untagged uses: statements..."
          count=$(grep -r 'uses:.*@[vm][^@]*$' .github/workflows .github/actions 2>/dev/null | grep -v '#' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "::error::Found $count untagged uses: statements (tags like @v4, @master, @v5 detected)"
            grep -r 'uses:.*@[vm][^@]*$' .github/workflows .github/actions 2>/dev/null | grep -v '#' | head -10
            echo "::endgroup::"
            exit 1
          fi
          echo "✓ All uses: statements are SHA-pinned (40 hex chars)"
          echo "::endgroup::"

  # ======================================================================
  # AUDIT 2: NO hardcoded secrets (AWS keys, GH tokens, etc)
  # ======================================================================
  check-hardcoded-secrets:
    name: Hardcoded secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Check for AWS keys (AKIA pattern)
        run: |
          echo "Scanning for hardcoded AWS keys..."
          if grep -r 'AKIA[A-Z0-9]\{16\}' .github 2>/dev/null; then
            echo "::error::AWS access key found in workflow files"
            exit 1
          fi
          echo "✓ No AWS keys detected"

      - name: Check for GH PATs (ghp_ pattern)
        run: |
          echo "Scanning for hardcoded GitHub PATs..."
          if grep -r 'ghp_[a-zA-Z0-9]\{36\}' .github 2>/dev/null; then
            echo "::error::GitHub PAT found in workflow files"
            exit 1
          fi
          echo "✓ No GitHub PATs detected"

      - name: Check for generic secret patterns
        run: |
          echo "Scanning for generic secret patterns..."
          patterns=(
            'password: [a-zA-Z0-9]'
            'api_key: [a-zA-Z0-9]'
            'secret: [a-zA-Z0-9]'
          )
          for pattern in "${patterns[@]}"; do
            if grep -rE "$pattern" .github/workflows --include="*.yml" --include="*.yaml" 2>/dev/null; then
              # Only error if it's NOT a variable reference (contains ${{ or similar)
              if ! grep -rE "$pattern" .github/workflows --include="*.yml" --include="*.yaml" 2>/dev/null | grep -q '\${{'; then
                echo "::warning::Possible hardcoded secret pattern found: $pattern"
              fi
            fi
          done
          echo "✓ Secret pattern check complete"

  # ======================================================================
  # AUDIT 3: EVERY workflow must have permissions: block
  # ======================================================================
  check-permissions:
    name: Permissions block audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: "Check all workflows have permissions: block"
        id: check-perms
        run: |
          echo "::group::Checking permissions: blocks..."
          missing=0
          workflows=$(find .github/workflows -name "*.yml" -o -name "*.yaml")
          while read -r wf; do
            if [ -n "$wf" ]; then
              if ! grep -q '^permissions:' "$wf"; then
                echo "  MISSING: $wf"
                missing=$((missing + 1))
              fi
            fi
          done <<< "$workflows"

          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing workflows missing permissions: block (Rule R.1)"
            echo "::endgroup::"
            exit 1
          fi
          echo "✓ All workflows have permissions: blocks"
          echo "::endgroup::"

  # ======================================================================
  # AUDIT 4: YAML validation + line length checks
  # ======================================================================
  validate-yaml:
    name: YAML syntax & style audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML syntax
        run: |
          echo "::group::YAML validation..."
          yamllint -d "{extends: default, rules: {line-length: {max: 180}, comments: {min-spaces-from-content: 2}}}" .github/workflows/ .github/actions/
          echo "✓ All YAML files valid"
          echo "::endgroup::"

      - name: Check for tabs (should use spaces)
        run: |
          echo "::group::Tab character check..."
          if grep -P '\t' .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null; then
            echo "::error::Tabs found in workflow files (use 2-space indentation)"
            exit 1
          fi
          echo "✓ No tabs detected"
          echo "::endgroup::"

  # ======================================================================
  # AUDIT 5: Anti-patterns (|| true in quality gates, --no-verify, etc)
  # ======================================================================
  check-anti-patterns:
    name: "Anti-patterns scan (Rule #11 compliance)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Check for error suppression in critical contexts
        run: |
          echo "::group::Anti-pattern detection..."

          # Check for || true in test/coverage steps (FATAL anti-pattern)
          echo "Checking for || true in test/coverage steps..."
          suspicious=$(grep -r '\btest\b.*|| true\|\bcov\|coverage.*|| true' .github/workflows --include="*.yml" --include="*.yaml" 2>/dev/null || true)
          if [ -n "$suspicious" ]; then
            echo "::warning::Found || true in test/coverage context (Rule #11):"
            echo "$suspicious" | head -5
          fi

          # Check for --no-verify (bypasses pre-commit hooks)
          echo "Checking for --no-verify flag..."
          if grep -r '\--no-verify' .github/workflows --include="*.yml" --include="*.yaml" 2>/dev/null; then
            echo "::warning::Found --no-verify flag (bypasses commit hooks)"
          fi

          echo "✓ Anti-pattern check complete"
          echo "::endgroup::"

  # ======================================================================
  # AUDIT 6: Local action references must be relative paths
  # ======================================================================
  check-action-refs:
    name: Local action references audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Check local action paths are relative
        run: |
          echo "::group::Local action reference audit..."

          # Local actions should use ./ or ../ paths, not full GitHub URLs
          bad_refs=$(grep -r 'uses: alebrije-io.*actions' .github/workflows --include="*.yml" --include="*.yaml" 2>/dev/null || true)
          if [ -n "$bad_refs" ]; then
            echo "::warning::Local actions should use relative paths (./) not full GitHub URLs:"
            echo "$bad_refs"
          fi

          # Check all action references are either:
          # - Relative paths (./ or ../)
          # - External actions with SHA (not @v* or @master)
          echo "✓ Local action reference check complete"
          echo "::endgroup::"

  # ======================================================================
  # AUDIT 7: Workflow structure validation
  # ======================================================================
  validate-structure:
    name: Workflow structure audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Check for reusable workflow markers
        run: |
          echo "::group::Reusable workflow validation..."

          # Check that reusable workflows have "on: workflow_call"
          reusable=$(find .github/workflows -name "reusable-*.yml" -o -name "*-action.yml")
          while read -r wf; do
            if [ -n "$wf" ]; then
              if [ "$(basename "$wf")" != "validate-self.yml" ]; then
                if grep -q "^on:" "$wf" && ! grep -q "workflow_call" "$wf"; then
                  echo "::warning::$wf might need workflow_call trigger"
                fi
              fi
            fi
          done <<< "$reusable"

          echo "✓ Reusable workflow check complete"
          echo "::endgroup::"

  # ======================================================================
  # AUDIT 8: Check concurrency blocks in reusable workflows
  # ======================================================================
  check-concurrency:
    name: Check concurrency blocks in reusable workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - name: Verify concurrency blocks
        run: |
          MISSING=0
          for f in .github/workflows/reusable-*.yml; do
            if ! grep -q "concurrency:" "$f"; then
              echo "::warning::Missing concurrency block in $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "::notice::$MISSING reusable workflows missing concurrency blocks (non-blocking)"
          else
            echo "PASS: All reusable workflows have concurrency blocks"
          fi

  # ======================================================================
  # AUDIT 9: Verify SHA-pinned actions have version comments
  # ======================================================================
  check-action-versions-commented:
    name: Verify SHA-pinned actions have version comments
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - name: Check SHA pins have version comments
        run: |
          MISSING=$(grep -rn 'uses:.*@[a-f0-9]\{40\}' .github/workflows .github/actions 2>/dev/null | grep -v '#[[:space:]]*v' | wc -l)
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::$MISSING SHA-pinned uses: without version comment (e.g., '# v4.1.7')"
            grep -rn 'uses:.*@[a-f0-9]\{40\}' .github/workflows .github/actions 2>/dev/null | grep -v '#[[:space:]]*v' | head -5
          else
            echo "PASS: All SHA-pinned uses: have version comments"
          fi

  # ======================================================================
  # AUDIT 10: Detect script injection via GitHub contexts
  # ======================================================================
  check-script-injection:
    name: Detect script injection via GitHub contexts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - name: Scan for direct context use in run steps
        run: |
          # Check for ${{ github.event.* }} used inline in run: (injection risk)
          # Safe pattern: wrapped in env: variable first
          RISKY=$(grep -rn '\${{[[:space:]]*github\.event\.' .github/workflows/ \
            --include="*.yml" 2>/dev/null | grep -v '^.*#' | wc -l)
          if [ "$RISKY" -gt 0 ]; then
            echo "::warning::$RISKY potential script injection points (github.event.* in workflows)"
            echo "Recommendation: wrap in env: variable before use in run:"
            grep -rn '\${{[[:space:]]*github\.event\.' .github/workflows/ --include="*.yml" 2>/dev/null | grep -v '^.*#' | head -5
          else
            echo "PASS: No direct github.event context usage detected"
          fi

  # ======================================================================
  # AUDIT 11: Validate event schemas structure
  # ======================================================================
  check-event-schemas-valid:
    name: Validate event schemas structure
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - uses: actions/setup-python@f677139bbe7f9c59030f3dec7cea6f7fc22ad2b7  # v5.2.0
        with:
          python-version: "3.12"
      - name: Validate all event schemas
        shell: python3 {0}
        run: |
          import json
          import glob
          import sys
          errors = []
          schemas = glob.glob("event-schemas/*.json")
          for f in schemas:
              if "envelope" in f or "README" in f or ".base." in f:
                  continue
              try:
                  schema = json.load(open(f))
                  if "allOf" not in schema:
                      errors.append(f"{f}: missing allOf (not extending envelope)")
                      continue
                  last_allof = schema["allOf"][-1]
                  props = last_allof.get("properties", {})
                  if "event_type" not in props:
                      errors.append(f"{f}: missing event_type const in properties")
                  if "data" not in props:
                      errors.append(f"{f}: missing data object in properties")
                  if "$id" not in schema:
                      errors.append(f"{f}: missing $id field")
              except json.JSONDecodeError as e:
                  errors.append(f"{f}: invalid JSON: {e}")
          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          print(f"PASS: All {len(schemas)} event schemas valid")

  # ======================================================================
  # AUDIT 12: Audit workflow permissions (least privilege)
  # ======================================================================
  check-minimum-permissions:
    name: Audit workflow permissions (least privilege)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - name: Check for missing permissions blocks
        run: |
          MISSING=0
          for f in .github/workflows/*.yml; do
            if ! grep -q "^permissions:" "$f"; then
              echo "::warning::Missing top-level permissions block in $f"
              MISSING=$((MISSING + 1))
            fi
          done
          echo "Workflows without top-level permissions: $MISSING"
      - name: Flag write permissions without comments
        run: |
          grep -rn 'contents: write\|packages: write\|security-events: write' \
            .github/workflows/ 2>/dev/null | head -20 || true
          echo "Review above write permissions are intentional"

  # ======================================================================
  # AUDIT 13: Validate reusable workflow inputs have descriptions
  # ======================================================================
  validate-workflow-inputs-documented:
    name: Validate reusable workflow inputs have descriptions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - uses: actions/setup-python@f677139bbe7f9c59030f3dec7cea6f7fc22ad2b7  # v5.2.0
        with:
          python-version: "3.12"
      - name: Check inputs have descriptions
        shell: python3 {0}
        run: |
          import yaml
          import glob
          import sys
          warnings = []
          for f in glob.glob(".github/workflows/reusable-*.yml"):
              try:
                  doc = yaml.safe_load(open(f))
                  inputs = (doc or {}).get("on", {}).get("workflow_call", {}).get("inputs", {})
                  for name, spec in (inputs or {}).items():
                      if not (spec or {}).get("description"):
                          warnings.append(f"{f}: input '{name}' has no description")
              except Exception:
                  pass
          for w in warnings:
              print(f"::warning::{w}")
          print(f"Inputs audit: {len(warnings)} missing descriptions (advisory)")

  # ======================================================================
  # AUDIT 14: Lint workflows with actionlint
  # ======================================================================
  lint-workflows:
    name: Lint workflows with actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - name: Run actionlint
        uses: rhysd/actionlint@v1
        with:
          flags: -color

  # ======================================================================
  # AUDIT 15: Audit timeout-minutes coverage
  # ======================================================================
  check-timeouts:
    name: Audit timeout-minutes coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - uses: actions/setup-python@f677139bbe7f9c59030f3dec7cea6f7fc22ad2b7  # v5.2.0
        with:
          python-version: "3.12"
      - name: Find jobs without timeout-minutes
        shell: python3 {0}
        run: |
          import yaml
          import glob
          missing = []
          for path in glob.glob('.github/workflows/*.yml'):
              try:
                  with open(path) as f:
                      data = yaml.safe_load(f)
                  for jname, jdef in (data.get('jobs') or {}).items():
                      if isinstance(jdef, dict) and 'timeout-minutes' not in jdef:
                          missing.append(f"{path}: {jname}")
              except Exception as e:
                  print(f"::warning::Error parsing {path}: {e}")
          for m in missing:
              print(f"::warning::No timeout-minutes: {m}")
          if missing:
              print(f"\nTotal jobs missing timeout-minutes: {len(missing)}")

  # ======================================================================
  # AUDIT 16: Check script injection via inputs.*
  # ======================================================================
  check-input-injection:
    name: Check script injection via inputs.*
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - uses: actions/setup-python@f677139bbe7f9c59030f3dec7cea6f7fc22ad2b7  # v5.2.0
        with:
          python-version: "3.12"
      - name: Scan for inputs.* in run blocks
        shell: python3 {0}
        run: |
          import glob
          import re
          pattern = re.compile(r'\$\{\{\s*inputs\.[^}]+\}\}')
          found_issues = []
          for path in glob.glob('.github/workflows/*.yml'):
              with open(path) as f:
                  lines = f.readlines()
              in_run = False
              for i, line in enumerate(lines):
                  if re.search(r'^\s+run:\s*\|', line):
                      in_run = True
                  elif in_run and line.strip() and not line.startswith(' ' * 4):
                      in_run = False
                  if in_run and pattern.search(line):
                      # Safe pattern: wrapped in env: variable first (starts with spaces + uppercase var name)
                      if not re.search(r'^\s+[A-Z_]+:\s*\$\{\{', line):
                          found_issues.append(f"{path}:{i+1}: {line.strip()[:80]}")
          for issue in found_issues:
              print(f"::warning::Potential injection {issue}")
          if found_issues:
              print(f"\nTotal potential injection points: {len(found_issues)}")
          else:
              print("PASS: No direct inputs.* usage in run blocks")

  # ======================================================================
  # AUDIT 17: Forbid the disabled ::set-output worker command
  #   GitHub disabled ::set-output on hosted runners in 2023; any remaining
  #   emission is a silent no-op (empty step outputs). Steps must write to
  #   $GITHUB_OUTPUT instead. FATAL — this is a prod-broken pattern.
  # ======================================================================
  check-no-deprecated-set-output:
    name: Forbid disabled ::set-output worker command
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7
      - uses: actions/setup-python@f677139bbe7f9c59030f3dec7cea6f7fc22ad2b7  # v5.2.0
        with:
          python-version: "3.12"
      - name: Scan for emitted set-output worker command
        shell: python3 {0}
        run: |
          import glob
          import sys
          # Build the needle from parts so this guard never matches its own
          # source line (avoids the self-reference deadlock).
          needle = "::set" + "-output name="
          offenders = []
          for path in glob.glob(".github/workflows/*.yml"):
              with open(path) as f:
                  for i, line in enumerate(f, 1):
                      stripped = line.strip()
                      # Documentary comment lines are allowed.
                      if stripped.startswith("#"):
                          continue
                      if needle in line:
                          offenders.append(f"{path}:{i}: {stripped[:80]}")
          if offenders:
              for o in offenders:
                  print(f"::error::Disabled worker command {needle!r} emitted "
                        f"(write to $GITHUB_OUTPUT instead): {o}")
              sys.exit(1)
          print(f"PASS: No disabled {needle!r} worker command emitted")

  # ======================================================================
  # SUMMARY: Aggregate all audit results
  # ======================================================================
  security-audit-summary:
    name: Security audit summary (Block R)
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - audit-shas
      - check-hardcoded-secrets
      - check-permissions
      - validate-yaml
      - check-anti-patterns
      - check-action-refs
      - validate-structure
      - check-concurrency
      - check-action-versions-commented
      - check-script-injection
      - check-event-schemas-valid
      - check-minimum-permissions
      - validate-workflow-inputs-documented
      - lint-workflows
      - check-timeouts
      - check-input-injection
      - check-no-deprecated-set-output
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Generate audit report
        id: report
        run: |
          echo "## GitHub Actions Security Audit (Block R)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA Pinning (supply chain) | ${{ needs.audit-shas.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hardcoded Secrets | ${{ needs.check-hardcoded-secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Permissions Blocks | ${{ needs.check-permissions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Validation | ${{ needs.validate-yaml.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Anti-patterns (Rule #11) | ${{ needs.check-anti-patterns.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action References | ${{ needs.check-action-refs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Structure | ${{ needs.validate-structure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Concurrency Blocks | ${{ needs.check-concurrency.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA Version Comments | ${{ needs.check-action-versions-commented.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Script Injection (github.event) | ${{ needs.check-script-injection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Event Schemas Valid | ${{ needs.check-event-schemas-valid.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Minimum Permissions | ${{ needs.check-minimum-permissions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Inputs Documented | ${{ needs.validate-workflow-inputs-documented.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Linting (actionlint) | ${{ needs.lint-workflows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timeout-minutes Audit | ${{ needs.check-timeouts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Script Injection (inputs.*) | ${{ needs.check-input-injection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Disabled ::set-output (prod-broken) | ${{ needs.check-no-deprecated-set-output.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.audit-shas.result }}" = "success" ] && \
             [ "${{ needs.check-hardcoded-secrets.result }}" = "success" ] && \
             [ "${{ needs.check-permissions.result }}" = "success" ] && \
             [ "${{ needs.validate-yaml.result }}" = "success" ]; then
            echo "**Status**: ✅ PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status**: ❌ FAIL" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment audit results on PR (if PR)
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@60a0d83039c74a4aee1596a2a764a0a72b574be9  # v7.0.1
        with:
          script: |
            const results = {
              'SHA Pinning': '${{ needs.audit-shas.result }}',
              'Hardcoded Secrets': '${{ needs.check-hardcoded-secrets.result }}',
              'Permissions': '${{ needs.check-permissions.result }}',
              'YAML Validation': '${{ needs.validate-yaml.result }}',
              'Anti-patterns': '${{ needs.check-anti-patterns.result }}',
              'Action Refs': '${{ needs.check-action-refs.result }}',
              'Structure': '${{ needs.validate-structure.result }}'
            };

            let failed = Object.entries(results).filter(([k,v]) => v !== 'success');
            if (failed.length > 0) {
              let comment = '## ⚠️ GitHub Actions Security Audit Failed\n\n';
              comment += '**Failed checks:**\n';
              failed.forEach(([check, result]) => {
                comment += `- ❌ ${check}: ${result}\n`;
              });
              comment += '\nSee the [workflow logs](';
              comment += context.payload.pull_request.html_url + '/checks) for details.\n';
              comment += '\n**ADR-001 Block R Requirements:**\n';
              comment += '1. All `uses:` statements must be SHA-pinned (not @v4, @master)\n';
              comment += '2. No hardcoded credentials\n';
              comment += '3. Every workflow must have `permissions:` block\n';
              comment += '4. Valid YAML syntax\n';
              comment += '5. No error suppression in quality gates\n';

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Fail if any audit failed
        if: |
          needs.audit-shas.result != 'success' ||
          needs.check-hardcoded-secrets.result != 'success' ||
          needs.check-permissions.result != 'success' ||
          needs.validate-yaml.result != 'success' ||
          needs.check-anti-patterns.result != 'success' ||
          needs.check-event-schemas-valid.result != 'success' ||
          needs.check-no-deprecated-set-output.result != 'success'
        run: exit 1
