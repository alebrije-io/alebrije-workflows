name: Validate alebrije-workflows

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  validate-yaml:
    name: Validate YAML workflows
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Validate GitHub Actions YAML
        run: yamllint -d relaxed .github/workflows/

  validate-scripts:
    name: Validate shell scripts
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: shellcheck *.sh
      - name: Syntax check
        run: bash -n validate-test-pool.sh && bash -n smoke_test.sh && echo OK

  validate-json:
    name: Validate JSON policies
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: Validate JSON
        run: |
          for f in *.json; do
            jq empty "$f" || exit 1
            echo "  OK $f"
          done

  validate-structure:
    name: Validate repository structure
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          for item in .github/workflows validate-test-pool.sh smoke_test.sh python-versions.json node-version.json approved-base-images.json README.md; do
            [ -e "$item" ] || { echo "Missing: $item"; exit 1; }
            echo "  OK $item"
          done

  security-check:
    name: Security scan
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - name: No hardcoded tokens
        run: |
          grep -rn 'AKIA[A-Z0-9]\{16\}' *.sh 2>/dev/null && { echo 'AWS key found'; exit 1; } || true
          grep -rn 'ghp_[a-zA-Z0-9]\{36\}' *.sh 2>/dev/null && { echo 'GH token found'; exit 1; } || true
          echo "Clean"

  final-report:
    name: Final validation
    runs-on: arc-runner-set
    needs: [validate-yaml, validate-scripts, validate-json, validate-structure, security-check]
    if: always()
    steps:
      - name: Summary
        run: |
          results=(
            "${{ needs.validate-yaml.result }}"
            "${{ needs.validate-scripts.result }}"
            "${{ needs.validate-json.result }}"
            "${{ needs.validate-structure.result }}"
            "${{ needs.security-check.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            [ "$r" = "success" ] || { echo "FAILED: $r"; failed=1; }
          done
          [ "$failed" = "0" ] && echo "alebrije-workflows validation PASSED" || exit 1
