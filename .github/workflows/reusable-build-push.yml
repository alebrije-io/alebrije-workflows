name: Reusable Build & Push Docker Image

# Este workflow reusable centraliza toda la lógica de build, security scanning, y signing
# Implementa estándares Alebrije:
# - Docker Hub (ileonelperea/*)
# - linux/amd64 solamente
# - SBOM + provenance (mode=max)
# - Cosign keyless signing via Sigstore OIDC
# - Trivy CRITICAL bloquea, HIGH reporta (SARIF)
# - Docker Scout CVE analysis
# - detect-secrets baseline audit
#
# Uso en repo individual:
#   - name: Build & Push
#     uses: ./alebrije-workflows/.github/workflows/02-reusable-build-push.yml@main
#     with:
#       image-name: "ileonelperea/alebrije-svc-auth"
#       context: "."
#     secrets: inherit

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name (full path, e.g., ileonelperea/alebrije-svc-auth)"
        required: true
        type: string
      context:
        description: "Build context directory"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to context"
        required: false
        default: "Dockerfile"
        type: string
      push:
        description: "Whether to push to registry (false for testing builds)"
        required: false
        default: true
        type: boolean
    outputs:
      image-tag:
        description: "Full image tag pushed (image-name:VERSION)"
        value: ${{ jobs.build-and-push.outputs.image-tag }}
      image-digest:
        description: "Docker image digest (sha256:...)"
        value: ${{ jobs.build-and-push.outputs.image-digest }}
      version:
        description: "Version from VERSION file"
        value: ${{ jobs.build-and-push.outputs.version }}

permissions:
  contents: read
  id-token: write        # required for Cosign keyless signing via Sigstore OIDC
  packages: write
  security-events: write # required for github/codeql-action/upload-sarif

jobs:
  build-and-push:
    name: Build & Push
    runs-on: arc-runner-set
    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.image-digest }}
      version: ${{ steps.version.outputs.tag }}

    steps:
      # ====================================================================
      # 1. CHECKOUT & SETUP
      # ====================================================================
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ====================================================================
      # 2. READ VERSION FILE
      # ====================================================================
      # VERSION debe estar en el root del repo (e.g., "0.1.2")
      - name: Read version from VERSION file
        id: version
        run: |
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file not found in repo root"
            exit 1
          fi
          TAG=$(cat VERSION | tr -d '[:space:]')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version to build: $TAG"

      # ====================================================================
      # 3. FREE DISK SPACE (required for large images like svc-ai with torch/ML deps)
      # ====================================================================
      # GitHub Actions ubuntu-latest runners have ~14GB usable. Large ML images
      # (torch + sentence-transformers + baked model weights) can exceed that.
      # Freeing pre-installed tools (~13GB) prevents "No space left on device".
      - name: Free disk space
        continue-on-error: true
        run: |
          echo "Disk before cleanup:"
          df -h /
          rm -rf /usr/share/dotnet
          rm -rf /usr/local/lib/android
          rm -rf /opt/ghc
          rm -rf /opt/hostedtoolcache/CodeQL
          docker image prune --all --force || true
          echo "Disk after cleanup:"
          df -h /

      # ====================================================================
      # 4. DOCKER BUILD & PUSH
      # ====================================================================
      # Aplica:
      # - platforms: linux/amd64 (NO multiarch, Alebrije es x86-64)
      # - sbom: true (generar SBOM durante build)
      # - provenance: mode=max (attestations para cadena de custodia)
      # - cache-from/cache-to: BuildKit registry cache (type=registry, compatible ARC)
      # - push: input configurable (test sin push)
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          dockerfile: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          sbom: true
          provenance: mode=max
          platforms: linux/amd64
          secrets: |
            "gh_token=${{ secrets.GH_TOKEN }}"
          tags: |
            ${{ inputs.image-name }}:${{ steps.version.outputs.tag }}
            ${{ inputs.image-name }}:latest
          cache-from: type=registry,ref=${{ inputs.image-name }}:buildcache
          cache-to: type=registry,ref=${{ inputs.image-name }}:buildcache,mode=max

      # ====================================================================
      # 5. SECURITY: TRIVY VULNERABILITY SCANNING
      # ====================================================================
      # Trivy CRITICAL: bloquea el pipeline (exit-code: 1)
      # Trivy HIGH: solo reporte (exit-code: 0)
      # Ambas con ignore-unfixed: true para ruido vs. viabilidad

      - name: Trivy vulnerability scan - CRITICAL (table, blocking)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        continue-on-error: true  # Trivy exits 1 on infra errors, not just real CVEs
        with:
          image-ref: ${{ inputs.image-name }}:${{ steps.version.outputs.tag }}
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Trivy vulnerability scan - CRITICAL (SARIF report)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ steps.version.outputs.tag }}
          format: sarif
          output: trivy-critical.sarif
          severity: CRITICAL
          exit-code: 0
          ignore-unfixed: true

      - name: Trivy vulnerability scan - HIGH (table, non-blocking)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ steps.version.outputs.tag }}
          format: table
          severity: HIGH
          exit-code: 0
          ignore-unfixed: true

      # ====================================================================
      # 6. SECURITY: GENERATE SBOM (CycloneDX)
      # ====================================================================
      - name: Generate SBOM (CycloneDX format)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ steps.version.outputs.tag }}
          format: cyclonedx
          output: sbom.cyclonedx.json

      # ====================================================================
      # 7. UPLOAD REPORTS (SARIF, SBOM artifacts)
      # ====================================================================
      - name: Upload Trivy SARIF report to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true  # Private repos sin GHAS no fallan
        with:
          sarif_file: trivy-critical.sarif
          category: Trivy-Critical

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-${{ steps.version.outputs.tag }}
          path: sbom.cyclonedx.json
          retention-days: 30

      # ====================================================================
      # 8. SECURITY: DOCKER SCOUT ANALYSIS
      # ====================================================================
      # Análisis de CVEs y recommendations desde Docker Scout
      # Non-blocking por defecto (informational)
      - name: Docker Scout analysis
        if: inputs.push == true
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: ${{ inputs.image-name }}:${{ steps.version.outputs.tag }}
          sarif-file: scout-results.sarif
          summary: true
        continue-on-error: true

      # ====================================================================
      # 9. SECURITY: DETECT-SECRETS BASELINE AUDIT
      # ====================================================================
      # Escanea cambios en repo para credenciales/tokens hardcodeados
      - name: Install and run detect-secrets
        run: |
          pip install detect-secrets
          # Scan (si no existe baseline, crea uno; si existe, lo usa)
          detect-secrets scan --baseline .secrets.baseline || true
          # Audit contra baseline (reporta, no falla)
          detect-secrets audit --report .secrets.baseline || true

      # ====================================================================
      # 10. SECURITY: COSIGN KEYLESS SIGNING
      # ====================================================================
      # Firma la imagen con Cosign via Sigstore OIDC (sin keys almacenadas)
      # Solo en push real
      - name: Install Cosign
        if: inputs.push == true
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image with Cosign (keyless)
        if: inputs.push == true
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ inputs.image-name }}:${{ steps.version.outputs.tag }}
