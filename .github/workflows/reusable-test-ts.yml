name: Reusable TypeScript/Next.js Test with Coverage

# ADR-001 Block A — standardized TypeScript testing workflow
#
# Implements coverage enforcement (90% gate immovable per Rule G).
# Extends reusable-test-node.yml pattern with explicit coverage validation.
#
# Frontend uses: Next.js 15 (App Router) + React 18 + vitest + TypeScript strict
# Coverage generation: vitest with json-summary reporter → coverage/coverage-summary.json
#
# Ejemplo uso en repo individual:
#   - name: Test (TypeScript)
#     uses: alebrije-io/alebrije-workflows/.github/workflows/reusable-test-ts.yml@main
#     with:
#       node-version: '22'
#       coverage-threshold: 90
#       run-e2e: false
#     secrets: inherit

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version (default from node-version.json: 22)'
        required: false
        default: '22'
        type: string
      coverage-threshold:
        description: 'Minimum coverage percentage (default 90 — immovable per Rule G)'
        required: false
        default: 90
        type: number
      run-e2e:
        description: 'Run Playwright E2E tests (expensive, disabled by default)'
        required: false
        default: false
        type: boolean
      working-directory:
        description: 'Working directory for monorepo support'
        required: false
        default: '.'
        type: string

concurrency:
  group: test-ts-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: arc-runner-set
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      # ====================================================================
      # Package manager detection — support pnpm/yarn/npm
      # ====================================================================
      - name: Detect package manager
        id: pm
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
          elif [ -f "yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
          else
            echo "manager=npm" >> $GITHUB_OUTPUT
          fi

      # ====================================================================
      # Node.js setup with cache
      # ====================================================================
      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@1a4442caab129478d0a1be482dbe86fb8fbf7f4f  # v4.1.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.pm.outputs.manager }}

      # ====================================================================
      # Install dependencies
      # ====================================================================
      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ steps.pm.outputs.manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ steps.pm.outputs.manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      # ====================================================================
      # Type check (TypeScript strict mode)
      # ====================================================================
      - name: Type check
        working-directory: ${{ inputs.working-directory }}
        run: npx tsc --noEmit

      # ====================================================================
      # Lint
      # ====================================================================
      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        run: npm run lint

      # ====================================================================
      # Unit & Integration Tests (with coverage)
      # CRITICAL: Must generate coverage/coverage-summary.json for gate
      # ====================================================================
      - name: Unit & Integration Tests
        working-directory: ${{ inputs.working-directory }}
        run: npm run test

      # ====================================================================
      # Coverage gate (fatal, not skippable)
      # Reads coverage/coverage-summary.json generated by vitest
      # Rule G: 90% floor is immovable — if gate fails, write more tests
      # ====================================================================
      - name: Validate coverage threshold (${{ inputs.coverage-threshold }}%)
        working-directory: ${{ inputs.working-directory }}
        run: |
          # Check file exists
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::error::coverage/coverage-summary.json not found — ensure vitest configured with json-summary reporter"
            exit 1
          fi

          # Extract minimum coverage across all metrics
          COVERAGE=$(node -e "
            const fs = require('fs');
            const cov = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = cov.total;
            const metrics = [
              t.lines.pct,
              t.statements.pct,
              t.functions.pct,
              t.branches.pct
            ];
            const min = Math.min(...metrics);
            console.log(min.toFixed(2));
          ")

          echo "Coverage: ${COVERAGE}%"

          # Fail if below threshold (fatal, no || true)
          THRESHOLD=${{ inputs.coverage-threshold }}
          if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            echo "To fix: write more tests and increase coverage"
            exit 1
          fi

          echo "✓ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

      # ====================================================================
      # Build (Next.js build validation)
      # ====================================================================
      - name: Build
        working-directory: ${{ inputs.working-directory }}
        run: npm run build

      # ====================================================================
      # Playwright E2E Tests (if enabled)
      # ====================================================================
      - name: Playwright E2E Tests
        if: ${{ inputs.run-e2e }}
        working-directory: ${{ inputs.working-directory }}
        run: npm run test:e2e

      # ====================================================================
      # Coverage upload (best-effort, non-blocking)
      # ====================================================================
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@125fc84a2bfd3c102d6a49fa07367b1ac6dbf2ac  # v4.4.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          fail_ci_if_error: false
