name: Create GitHub Release

# Reusable workflow that automates GitHub Release creation on tag push (vX.Y.Z).
# It extracts the matching CHANGELOG.md section and uses it as the release notes.
#
# Intended callers: Python services that consume alebrije-workflows.
# Go/Elixir services inline the equivalent job in their own ci.yml per ADR-41.

on:
  workflow_call:

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          SECTION=$(awk -v v="$VERSION" '
            /^## \[/ { in_section = 0 }
            $0 ~ "^## \\[" v "\\]" { in_section = 1; next }
            in_section { print }
          ' CHANGELOG.md)

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.changelog.outputs.notes }}"
