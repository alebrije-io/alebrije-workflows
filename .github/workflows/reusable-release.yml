name: Create GitHub Release

# Reusable workflow that automates GitHub Release creation on tag push (vX.Y.Z).
# It extracts the matching CHANGELOG.md section and uses it as the release notes.
#
# Intended callers: Python services that consume alebrije-workflows.
# Go/Elixir services inline the equivalent job in their own ci.yml per ADR-41.

on:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: arc-runner-set
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          SECTION=$(awk -v v="$VERSION" '
            /^## \[/ { in_section = 0 }
            $0 ~ "^## \\[" v "\\]" { in_section = 1; next }
            in_section { print }
          ' CHANGELOG.md)

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.changelog.outputs.notes }}"
          echo "✅ GitHub Release $TAG created" >> $GITHUB_STEP_SUMMARY

      - name: Release summary
        if: always()
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "## GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: $TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
