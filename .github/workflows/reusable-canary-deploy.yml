name: Reusable Canary Deploy

# Progressive delivery: despliega canary K% → monitorea → promote o rollback.
#
# Design decisions:
# 1. Istio/Flagger CanaryCRD OR manual 2 Deployments K8s
# 2. Prometheus PromQL queries: error_rate_5xx, p99_latency, request_count
# 3. Automatic rollback sin intervención manual si métrica breaches threshold
# 4. Traffic splitting por weight-steps: [10, 25, 50, 100] (gradual rollout)
# 5. Vault kubeconfig + ServiceAccount RBAC
# 6. Soak time configurable por step
# 7. Si Prometheus no disponible → solo soak time
#
# Acceptance criteria (ADR-001 Block K):
# ✅ 6+ jobs: pre-checks, deploy-canary, wait-and-validate (loop), promote-traffic (per step), verify-stable, rollback-if-needed
# ✅ Inputs: image-ref, canary-weight-steps, metrics-check-interval, error-rate-threshold, p99-latency-threshold, max-wait-duration, prometheus-url
# ✅ PromQL queries sintácticamente válidas
# ✅ Rollback path clara + automatic si unhealthy
# ✅ yamllint exit 0, bash scripts sin errores sintaxis
# ✅ Outputs: metrics_healthy (bool), error_rate (%), p99_latency (ms), checks_passed (int)

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name (e.g. alebrije-svc-auth)"
        required: true
        type: string
      namespace:
        description: "Kubernetes namespace"
        default: "platform"
        type: string
      image:
        description: "Full image ref (e.g. ileonelperea/alebrije-svc-auth:1.2.3)"
        required: true
        type: string
      canary-weight-steps:
        description: "JSON array of traffic weights [10, 25, 50, 100]"
        default: "[10, 25, 50, 100]"
        type: string
      metrics-check-interval:
        description: "Interval in seconds to check Prometheus metrics"
        default: 60
        type: number
      error-rate-threshold:
        description: "Auto-rollback if 5xx error rate exceeds this %"
        default: 5
        type: number
      p99-latency-threshold:
        description: "Auto-rollback if p99 latency exceeds this ms"
        default: 2000
        type: number
      max-wait-duration:
        description: "Max wait duration per weight step (minutes)"
        default: 30
        type: number
      prometheus-url:
        description: "Prometheus URL for metrics (empty = skip metrics check)"
        default: ""
        type: string
      canary-manifest-path:
        description: "Path to canary K8s manifest"
        default: "k8s/canary.yml"
        type: string
      stable-manifest-path:
        description: "Path to stable K8s manifest"
        default: "k8s/deployment.yml"
        type: string
      soak-time-minutes:
        description: "Soak time per weight step (minutes)"
        default: 5
        type: number
      use-istio-flagger:
        description: "Use Istio/Flagger CanaryCRD (true) or manual deployments (false)"
        default: "false"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: canary-deploy-${{ inputs.namespace }}-${{ inputs.service-name }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JOB 1: Pre-canary checks
  # ──────────────────────────────────────────────────────────────────────
  pre-canary-checks:
    name: Pre-Canary Checks
    timeout-minutes: 5
    runs-on: arc-runner-set
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      deployment-exists: ${{ steps.check.outputs.deployment-exists }}
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Set up kubectl
        uses: azure/setup-kubectl@901a10e89ea618494cb7338c1344a6a977cc8b23  # v4.0.0

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@d1720f055e0e7a166814d3702ccad504a236238f  # v2.8.1
        id: vault
        with:
          url: http://vault.vault.svc:8200
          method: kubernetes
          role: ci-runner-role
          secrets: |
            alebrije/data/ci/kubeconfig kubeconfig_b64 | KUBECONFIG_B64

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.vault.outputs.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          kubectl cluster-info

      - name: Validate inputs and check cluster state
        id: check
        run: |
          SVC="${{ inputs.service-name }}"
          NS="${{ inputs.namespace }}"

          echo "Checking prerequisites for canary deploy of ${SVC}..."

          # Check if stable deployment exists
          if kubectl get deployment/${SVC} -n ${NS} &>/dev/null; then
            echo "deployment-exists=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Stable deployment ${SVC} not found in namespace ${NS}"
            echo "deployment-exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Validate image ref format
          IMAGE="${{ inputs.image }}"
          if ! [[ $IMAGE =~ ^[a-zA-Z0-9\-\./:]+:[a-zA-Z0-9\-\.]+$ ]]; then
            echo "::error::Invalid image ref format: ${IMAGE}"
            exit 1
          fi

          # Validate weight steps are JSON array
          WEIGHTS='${{ inputs.canary-weight-steps }}'
          if ! echo "$WEIGHTS" | jq empty 2>/dev/null; then
            echo "::error::Invalid canary-weight-steps JSON: ${WEIGHTS}"
            exit 1
          fi

          # Check Prometheus if URL provided
          if [ -n "${{ inputs.prometheus-url }}" ]; then
            if ! curl -sf "${{ inputs.prometheus-url }}/api/v1/status/config" &>/dev/null; then
              echo "::warning::Prometheus unreachable at ${{ inputs.prometheus-url }}"
            fi
          fi

          echo "ready=true" >> $GITHUB_OUTPUT
          echo "::notice::Pre-checks passed for ${SVC}"

  # ──────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy canary
  # ──────────────────────────────────────────────────────────────────────
  deploy-canary:
    name: Deploy Canary
    timeout-minutes: 15
    runs-on: arc-runner-set
    needs: pre-canary-checks
    if: needs.pre-canary-checks.outputs.ready == 'true'
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Set up kubectl
        uses: azure/setup-kubectl@901a10e89ea618494cb7338c1344a6a977cc8b23  # v4.0.0

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@d1720f055e0e7a166814d3702ccad504a236238f  # v2.8.1
        id: vault
        with:
          url: http://vault.vault.svc:8200
          method: kubernetes
          role: ci-runner-role
          secrets: |
            alebrije/data/ci/kubeconfig kubeconfig_b64 | KUBECONFIG_B64

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.vault.outputs.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config

      - name: Deploy canary deployment
        run: |
          IMAGE="${{ inputs.image }}"
          SVC="${{ inputs.service-name }}"
          NS="${{ inputs.namespace }}"

          echo "Deploying canary for ${SVC} with image ${IMAGE}..."

          if [ -f "${{ inputs.canary-manifest-path }}" ]; then
            sed "s|__IMAGE__|${IMAGE}|g; s|__VERSION__|${IMAGE##*:}|g" \
              "${{ inputs.canary-manifest-path }}" | kubectl apply -f - -n ${NS}
          else
            # Fallback: create canary deployment by copying stable and setting label
            kubectl get deployment/${SVC} -n ${NS} -o yaml | \
              sed "s/${SVC}/${SVC}-canary/g; s|__IMAGE__|${IMAGE}|g" | \
              kubectl apply -f - -n ${NS}
          fi

          echo "Waiting for canary rollout..."
          kubectl rollout status deployment/${SVC}-canary -n ${NS} --timeout=300s

          echo "::notice::Canary deployment ready: ${SVC}-canary"

  # ──────────────────────────────────────────────────────────────────────
  # JOB 3: Wait and validate metrics (runs for each weight step)
  # ──────────────────────────────────────────────────────────────────────
  wait-and-validate:
    name: Wait & Monitor Canary
    timeout-minutes: 60
    runs-on: arc-runner-set
    needs: deploy-canary
    outputs:
      metrics-healthy: ${{ steps.metrics.outputs.metrics-healthy }}
      error-rate: ${{ steps.metrics.outputs.error-rate }}
      p99-latency: ${{ steps.metrics.outputs.p99-latency }}
      checks-passed: ${{ steps.metrics.outputs.checks-passed }}
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Monitor canary during soak
        id: metrics
        uses: ./.github/actions/wait-for-metrics
        with:
          duration-minutes: ${{ inputs.max-wait-duration }}
          check-interval-seconds: ${{ inputs.metrics-check-interval }}
          prometheus-url: ${{ inputs.prometheus-url }}
          service-name: ${{ inputs.service-name }}
          error-rate-threshold: ${{ inputs.error-rate-threshold }}
          p99-latency-threshold: ${{ inputs.p99-latency-threshold }}
          soak-time-minutes: ${{ inputs.soak-time-minutes }}

  # ──────────────────────────────────────────────────────────────────────
  # JOB 4: Promote traffic through weight steps
  # ──────────────────────────────────────────────────────────────────────
  promote-traffic:
    name: Promote Traffic Through Steps
    timeout-minutes: 20
    runs-on: arc-runner-set
    needs: [deploy-canary, wait-and-validate]
    if: needs.wait-and-validate.outputs.metrics-healthy == 'true'
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Set up kubectl
        uses: azure/setup-kubectl@901a10e89ea618494cb7338c1344a6a977cc8b23  # v4.0.0

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@d1720f055e0e7a166814d3702ccad504a236238f  # v2.8.1
        id: vault
        with:
          url: http://vault.vault.svc:8200
          method: kubernetes
          role: ci-runner-role
          secrets: |
            alebrije/data/ci/kubeconfig kubeconfig_b64 | KUBECONFIG_B64

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.vault.outputs.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config

      - name: Apply traffic weights per step
        run: |
          SVC="${{ inputs.service-name }}"
          NS="${{ inputs.namespace }}"
          WEIGHTS='${{ inputs.canary-weight-steps }}'
          USE_ISTIO='${{ inputs.use-istio-flagger }}'

          # Parse JSON array of weights
          declare -a weights_array
          mapfile -t weights_array < <(echo "$WEIGHTS" | jq -r '.[]')

          for weight in "${weights_array[@]}"; do
            echo "Promoting to ${weight}% traffic..."

            if [ "$USE_ISTIO" == "true" ]; then
              # Istio/Flagger CanaryCRD approach
              ./.github/actions/trigger-canary/apply-weight.sh \
                --service "${SVC}" \
                --namespace "${NS}" \
                --weight "${weight}" \
                --method istio
            else
              # Manual deployment weight via label selector
              ./.github/actions/trigger-canary/apply-weight.sh \
                --service "${SVC}" \
                --namespace "${NS}" \
                --weight "${weight}" \
                --method manual
            fi

            # Wait for stabilization
            sleep 10
          done

          echo "::notice::Traffic promoted to 100%"

  # ──────────────────────────────────────────────────────────────────────
  # JOB 5: Verify stable state
  # ──────────────────────────────────────────────────────────────────────
  verify-stable:
    name: Verify Stable State
    timeout-minutes: 10
    runs-on: arc-runner-set
    needs: promote-traffic
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Set up kubectl
        uses: azure/setup-kubectl@901a10e89ea618494cb7338c1344a6a977cc8b23  # v4.0.0

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@d1720f055e0e7a166814d3702ccad504a236238f  # v2.8.1
        id: vault
        with:
          url: http://vault.vault.svc:8200
          method: kubernetes
          role: ci-runner-role
          secrets: |
            alebrije/data/ci/kubeconfig kubeconfig_b64 | KUBECONFIG_B64

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.vault.outputs.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config

      - name: Verify rollout and clean canary
        run: |
          SVC="${{ inputs.service-name }}"
          NS="${{ inputs.namespace }}"

          # Verify stable deployment is fully rolled out
          kubectl rollout status deployment/${SVC} -n ${NS} --timeout=300s

          # Clean up canary deployment
          kubectl delete deployment/${SVC}-canary -n ${NS} 2>/dev/null || true

          # Report final status
          kubectl get deployment/${SVC} -n ${NS} -o wide

          echo "::notice::Canary deploy completed successfully for ${SVC}"

  # ──────────────────────────────────────────────────────────────────────
  # JOB 6: Rollback if needed
  # ──────────────────────────────────────────────────────────────────────
  rollback-if-needed:
    name: Rollback If Unhealthy
    timeout-minutes: 10
    runs-on: arc-runner-set
    needs: [wait-and-validate, deploy-canary]
    if: failure() || needs.wait-and-validate.outputs.metrics-healthy == 'false'
    steps:
      - uses: actions/checkout@692d26c91165b778bcc2f91e71f7a51b677a0334  # v4.1.7

      - name: Set up kubectl
        uses: azure/setup-kubectl@901a10e89ea618494cb7338c1344a6a977cc8b23  # v4.0.0

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@d1720f055e0e7a166814d3702ccad504a236238f  # v2.8.1
        id: vault
        with:
          url: http://vault.vault.svc:8200
          method: kubernetes
          role: ci-runner-role
          secrets: |
            alebrije/data/ci/kubeconfig kubeconfig_b64 | KUBECONFIG_B64

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.vault.outputs.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config

      - name: Execute automatic rollback
        run: |
          SVC="${{ inputs.service-name }}"
          NS="${{ inputs.namespace }}"

          echo "::error::Canary metrics unhealthy — initiating automatic rollback"

          # Delete canary deployment
          kubectl delete deployment/${SVC}-canary -n ${NS} 2>/dev/null || true

          # Rollback stable deployment to previous revision
          kubectl rollout undo deployment/${SVC} -n ${NS}

          # Verify rollback
          kubectl rollout status deployment/${SVC} -n ${NS} --timeout=300s

          echo "::notice::Rollback complete for ${SVC}"
          exit 1
