name: Wait for Metrics
description: "Wait for soak time and validate Prometheus metrics (error_rate, p99_latency). Rolls back automatically if thresholds breached."

inputs:
  duration-minutes:
    description: "Max duration to wait overall (minutes)"
    required: true
  check-interval-seconds:
    description: "Interval to check Prometheus (seconds)"
    default: "60"
    required: false
  prometheus-url:
    description: "Prometheus URL (empty = skip metrics check)"
    default: ""
    required: false
  service-name:
    description: "Service name for Prometheus job selector"
    required: true
  error-rate-threshold:
    description: "Max 5xx error rate % before rollback"
    default: "5"
    required: false
  p99-latency-threshold:
    description: "Max p99 latency ms before rollback"
    default: "2000"
    required: false
  soak-time-minutes:
    description: "Minimum soak time per weight step (minutes)"
    default: "5"
    required: false

outputs:
  metrics-healthy:
    description: "true if all checks passed, false if any threshold exceeded"
    value: ${{ steps.validate.outputs.metrics-healthy }}
  error-rate:
    description: "Final 5xx error rate %"
    value: ${{ steps.validate.outputs.error-rate }}
  p99-latency:
    description: "Final p99 latency ms"
    value: ${{ steps.validate.outputs.p99-latency }}
  checks-passed:
    description: "Number of successful metric checks"
    value: ${{ steps.validate.outputs.checks-passed }}

runs:
  using: composite
  steps:
    - name: Validate metrics
      id: validate
      shell: bash
      env:
        SERVICE_NAME: ${{ inputs.service-name }}
        PROMETHEUS_URL: ${{ inputs.prometheus-url }}
        ERROR_RATE_THRESHOLD: ${{ inputs.error-rate-threshold || '5' }}
        LATENCY_P99_THRESHOLD: ${{ inputs.p99-latency-threshold || '2000' }}
        SOAK_SECONDS: ${{ inputs.soak-time-minutes && format('{0} * 60', inputs.soak-time-minutes) || '300' }}
        CHECK_INTERVAL: ${{ inputs.check-interval-seconds || '15' }}
        DURATION_MINUTES: ${{ inputs.duration-minutes }}
      run: |
        chmod +x "${{ github.action_path }}/check-metrics.sh"
        RESULT=0
        OUTPUT=$("${{ github.action_path }}/check-metrics.sh" 2>&1) || RESULT=$?

        # Parse outputs from script
        ERROR_RATE=$(echo "$OUTPUT" | grep "Final error rate:" | awk '{print $4}')
        P99_LATENCY=$(echo "$OUTPUT" | grep "Final p99 latency:" | awk '{print $4}')
        CHECKS=$(echo "$OUTPUT" | grep "Checks completed:" | awk '{print $3}')
        HEALTHY=$(echo "$OUTPUT" | grep "Metrics healthy:" | awk '{print $3}')

        # Default values if parse failed
        ERROR_RATE="${ERROR_RATE:-0}"
        P99_LATENCY="${P99_LATENCY:-0}"
        CHECKS="${CHECKS:-0}"
        HEALTHY="${HEALTHY:-false}"

        echo "metrics-healthy=${HEALTHY}" >> $GITHUB_OUTPUT
        echo "error-rate=${ERROR_RATE}" >> $GITHUB_OUTPUT
        echo "p99-latency=${P99_LATENCY}" >> $GITHUB_OUTPUT
        echo "checks-passed=${CHECKS}" >> $GITHUB_OUTPUT

        echo "$OUTPUT"
        exit $RESULT
