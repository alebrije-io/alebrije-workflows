name: Setup Vault Token
description: |
  Fleet-standard Vault authentication wrapper (ADR-001 Block P).
  Authenticates via Kubernetes SA, exports requested secrets as env vars.
  Defaults match arc-runner-set + ci-runner-role (Alebrije fleet standard).

inputs:
  vault-url:
    description: "Vault server URL"
    required: false
    default: "http://vault.vault.svc:8200"
  vault-role:
    description: "Kubernetes auth role"
    required: false
    default: "ci-runner-role"
  secrets:
    description: "Vault secrets spec (hashicorp/vault-action format: 'path key | ENV_VAR ;')"
    required: true
  extra-secrets:
    description: "Additional secrets spec appended to secrets (optional)"
    required: false
    default: ""

outputs:
  vault-token:
    description: "Vault token (available as VAULT_TOKEN env var after action runs)"
    value: ${{ steps.vault.outputs.vault_token }}

runs:
  using: composite
  steps:
    - name: Authenticate to Vault (Kubernetes auth)
      id: vault
      uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b  # v3
      with:
        url: ${{ inputs.vault-url }}
        method: kubernetes
        role: ${{ inputs.vault-role }}
        secrets: |
          ${{ inputs.secrets }}
          ${{ inputs.extra-secrets }}
